<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Why Save README banner</title>
  <desc id="desc">Why Save logo with the text Capture the why behind every downloaded file.</desc>
  <defs>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#174E4B" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1600" height="520" fill="#F8FFFC"/>
  <rect x="0" y="0" width="1600" height="8" fill="#174E4B"/>

  <g transform="translate(168 132)" filter="url(#logoShadow)">
    <rect x="0" y="0" width="256" height="256" rx="58" fill="#174E4B"/>
    <path d="M56 54 128 135 200 54" fill="none" stroke="#FFFFFF" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M128 135v81" fill="none" stroke="#FFFFFF" stroke-width="42" stroke-linecap="round"/>
    <path d="M203 39h30a10 10 0 0 1 10 10v76l-25-18-25 18V49a10 10 0 0 1 10-10Z" fill="#7DDDC6"/>
