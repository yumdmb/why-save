    <text x="4" y="142" fill="#305C58" font-size="40" font-weight="600">Capture the why behind every downloaded file.</text>
    <line x1="6" y1="188" x2="712" y2="188" stroke="#D9E9E5" stroke-width="2"/>
    <text x="6" y="236" fill="#5F7470" font-size="24" font-weight="500">Local-first file memory for Windows.</text>
