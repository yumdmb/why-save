name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    name: Build & Test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore WhySave.sln

      - name: Build
        run: dotnet build WhySave.sln --no-restore -c Release

      - name: Test
        run: dotnet test WhySave.sln --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage"
